    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var toggles = document.querySelectorAll(".toggle");
            toggles.forEach(function (toggle) {
                //var content = toggle.closest('.qg-tab').nextElementSibling;
                var content = document.getElementById(toggle.getAttribute("data-Target"));
                var label = toggle.closest('.qg-tab').querySelector('.qg-tab__label');
                toggle.addEventListener('change', function () {
                    if (toggle.checked) {
                        content.style.display = 'table-row-group';
                        label.classList.add('open');
                    } else {
                        content.style.display = 'none';
                        label.classList.remove('open');
                    }
                });
            })
            // var toggle = document.getElementById('toggle1');
